<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión — CentralWeb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-900:  #0d2244;
    --blue-800:  #0e3a6e;
    --blue-700:  #1352a8;
    --blue-600:  #1a6cd4;
    --blue-500:  #2183f0;
    --blue-400:  #4fa3f7;
    --blue-300:  #7cc2fb;
    --blue-200:  #bfdffd;
    --blue-100:  #e8f3fe;
    --blue-50:   #f4f9ff;

    --accent:       #2456C9;
    --accent-light: #4C8DFF;

    --text-primary:   #0d1f3c;
    --text-secondary: #4a6285;
    --text-muted:     #8ba4c4;
    --border:         #d0e2f7;
    --bg:             #f0f5fc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-shell {
    width: 100%;
    max-width: 900px;
    min-height: 600px;
    display: flex;
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(13,34,68,.16);
  }

  .auth-side {
    width: 340px;
    flex-shrink: 0;
    background: var(--blue-900);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 36px 32px;
  }
  .auth-side svg.rings { position: absolute; inset: 0; width: 100%; height: 100%; }
  .auth-side .logo {
    display: flex; align-items: baseline; gap: 2px; position: relative; font-family: 'Space Grotesk';
  }
  .auth-side .logo b { font-weight: 700; font-size: 21px; color: #fff; }
  .auth-side .logo span { font-weight: 700; font-size: 21px; color: var(--accent-light); }
  .auth-side .logo em {
    font-style: normal; font-weight: 500; font-size: 21px; color: var(--accent-light); letter-spacing: .02em;
  }
  .auth-side .tag { position: relative; display: flex; align-items: center; gap: 18px; }
  .auth-side .tag .divider { width: 1px; height: 44px; background: rgba(255,255,255,.14); }
  .auth-side .tag .label {
    font-family: 'Space Grotesk'; font-weight: 500; font-size: 13px; color: #8fa8dd; letter-spacing: .04em; line-height: 1.4;
  }

  .auth-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 48px;
  }
  .auth-main h1 {
    font-family: 'Space Grotesk'; font-weight: 700; font-size: 24px; color: var(--blue-900);
    margin: 0 0 6px; letter-spacing: -0.01em;
  }
  .auth-main .sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

  label.field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .field { margin-bottom: 16px; }
  .input-box {
    display: flex; align-items: center; gap: 10px;
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 11px 13px; background: #fbfcfe;
  }
  .input-box svg { flex-shrink: 0; color: #8fa0c4; }
  .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(36,86,201,.12); }
  .input-box:focus-within svg { color: var(--accent); }
  .input-box input[type=email], .input-box input[type=password], .input-box input[type=text] {
    border: none; outline: none; background: transparent; flex: 1;
    font-family: 'Manrope'; font-size: 14px; color: var(--text-primary); padding: 0;
  }

  .pwd-toggle {
    background: none; border: none; cursor: pointer; padding: 2px;
    color: var(--accent); display: flex; align-items: center; flex-shrink: 0;
  }

  .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .remember input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .remember span { font-size: 13px; color: var(--text-secondary); }
  .forgot-link { font-size: 13px; color: var(--accent); font-weight: 600; text-decoration: none; cursor: pointer; }

  .error-msg { font-size: 12px; color: #b91c1c; margin: -6px 0 14px; display: none; }
  .error-msg.show { display: block; }

  button.btn-primary {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Manrope';
    cursor: pointer;
    background: var(--accent);
    color: white;
    box-shadow: 0 10px 24px rgba(36,86,201,.3);
  }
  button.btn-primary:hover { background: var(--blue-700); }

  .alt-link { text-align: center; font-size: 12.5px; color: var(--text-muted); margin: 22px 0 0; }
  .alt-link a { color: var(--accent); text-decoration: none; font-weight: 600; }

  @media (max-width: 720px) {
    .auth-side { display: none; }
    .auth-shell { max-width: 420px; }
  }
</style>
</head>
<body>

<div class="auth-shell">
  <div class="auth-side">
    <svg class="rings" viewBox="0 0 340 600" xmlns="http://www.w3.org/2000/svg">
      <circle cx="250" cy="150" r="170" fill="none" stroke="#122a54" stroke-width="1.5"></circle>
      <circle cx="250" cy="150" r="120" fill="none" stroke="#16305e" stroke-width="1.5"></circle>
      <circle cx="250" cy="150" r="70" fill="none" stroke="#1c3a72" stroke-width="1.5"></circle>
      <circle cx="250" cy="150" r="30" fill="none" stroke="#2456C9" stroke-width="2"></circle>
      <circle cx="250" cy="30" r="6" fill="#4C8DFF"></circle>
      <circle cx="120" cy="430" r="110" fill="none" stroke="#122a54" stroke-width="1.5"></circle>
      <circle cx="120" cy="430" r="60" fill="none" stroke="#16305e" stroke-width="1.5"></circle>
      <circle cx="120" cy="370" r="4" fill="#2456C9"></circle>
    </svg>

    <div class="logo"><b>central</b><span>.</span><em>web</em></div>

    <div class="tag">
      <svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="none" stroke="#274a8c" stroke-width="3"></circle>
        <circle cx="32" cy="32" r="20" fill="none" stroke="#4C8DFF" stroke-width="3.5"></circle>
        <circle cx="32" cy="12" r="6" fill="#4C8DFF"></circle>
        <circle cx="32" cy="32" r="4" fill="#fff"></circle>
      </svg>
      <div class="divider"></div>
      <div class="label">GESTIÓN DE<br>CASOS</div>
    </div>
  </div>

  <div class="auth-main">
    <h1>Iniciar sesión</h1>
    <div class="sub">Accedé al panel de tu empresa</div>

    <div class="field">
      <label class="field-label">Email</label>
      <div class="input-box">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="3" width="13" height="10" rx="2"></rect><path d="M2 4l6 5 6-5"></path></svg>
        <input type="email" id="input-email" placeholder="tu@empresa.com">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Contraseña</label>
      <div class="input-box">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="7" width="10" height="7" rx="1.5"></rect><path d="M5 7V4.5a3 3 0 016 0V7"></path></svg>
        <input type="password" id="input-password" placeholder="Tu contraseña">
        <button type="button" class="pwd-toggle" onclick="_togglePwd('input-password', this)" aria-label="Mostrar contraseña"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="input-remember">
        <span>Recordarme</span>
      </label>
      <a class="forgot-link" href="#" onclick="olvidoPassword(); return false;">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-primary" onclick="iniciarSesion()">Ingresar</button>

    <p class="alt-link">¿Todavía no tenés cuenta? <a href="alta-inicial.html">Creá tu empresa acá</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  (function () {
    var savedEmail = localStorage.getItem('cw_remember_email');
    if (savedEmail) {
      var emailEl = document.getElementById('input-email');
      var rememberEl = document.getElementById('input-remember');
      if (emailEl) emailEl.value = savedEmail;
      if (rememberEl) rememberEl.checked = true;
    }
  })();
</script>
<script>
  function mostrarError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
  }

  async function olvidoPassword() {
    const email = document.getElementById('input-email').value.trim();
    const el = document.getElementById('error-msg');
    el.style.color = '';
    if (!email) {
      mostrarError('Ingresá tu email arriba y volvé a hacer clic en "¿Olvidaste tu contraseña?".');
      return;
    }
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: 'https://centralweb.novadgt.com/reset-password.html' });
    if (error) {
      mostrarError(error.message);
      return;
    }
    el.style.color = '#059669';
    mostrarError('Te enviamos un email con instrucciones para restablecer tu contraseña.');
  }

  function _togglePwd(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
  }

  async function iniciarSesion() {
    const email = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;

    if (!email || !password) {
      mostrarError('Completá email y contraseña.');
      return;
    }

    var rememberEl2 = document.getElementById('input-remember');
    if (rememberEl2 && rememberEl2.checked) {
      localStorage.setItem('cw_remember_email', email);
    } else {
      localStorage.removeItem('cw_remember_email');
    }

    const boton = document.querySelector('.btn-primary');
    boton.disabled = true;
    boton.textContent = 'Ingresando...';

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      boton.disabled = false;
      boton.textContent = 'Iniciar sesión';
      mostrarError(error.message === 'Email not confirmed'
        ? 'Todavía no confirmaste tu email. Revisá tu correo.'
        : 'Email o contraseña incorrectos.');
      return;
    }

    window.location.href = 'casos.html';
  }

  // Si ya hay sesion activa, no hace falta loguearse de nuevo
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'casos.html';
  });
</script>

</body>
</html>
