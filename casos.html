    });
  });

  // Resaltado del menú de bandejas reforzado por JS (no depender solo de :hover),
  // delegado en el documento para cubrir también los ítems de usuario que se renderizan dinámicamente.
  document.addEventListener('mouseover', e => {
    const item = e.target.closest('.bandeja-item, .bandeja-usuarios-toggle');
    if (item) item.classList.add('hovered');
  });
  document.addEventListener('mouseout', e => {
    const item = e.target.closest('.bandeja-item, .bandeja-usuarios-toggle');
    if (item && !item.contains(e.relatedTarget)) item.classList.remove('hovered');
  });

  // ════════════════════════════════
  //  ESTADO DROPDOWN
  // ════════════════════════════════
  document.getElementById('estado-btn').addEventListener('click', e => {
    e.stopPropagation();
    if (document.getElementById('estado-btn').classList.contains('disabled')) return;
    document.getElementById('estado-menu').classList.toggle('open');
  });
  document.getElementById('bandeja-menu').addEventListener('click', e => e.stopPropagation());
  document.getElementById('config-menu').addEventListener('click', e => e.stopPropagation());

  document.addEventListener('click', () => {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    document.getElementById('bandeja-menu').classList.remove('open');
    document.getElementById('bandeja-usuarios-list')?.classList.remove('open');
    document.getElementById('usuarios-toggle-btn')?.classList.remove('open');
  });

  // ════════════════════════════════
  //  MODAL NUEVO CASO
  // ════════════════════════════════
  document.getElementById('btn-nuevo-caso').addEventListener('click', () => {
    ['nuevo-caso-nombre','nuevo-caso-apellido','nuevo-caso-email','nuevo-caso-asunto'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    renderNuevoCasoBandejaSelect();
    renderNuevoCasoAsignadoSelect();
    document.getElementById('nuevo-caso-estado').value = 'abierto';
    document.getElementById('nuevo-caso-mensaje').innerHTML = '';
    _nuevoCasoAttachFiles = [];
    document.getElementById('nuevo-caso-attach-list').innerHTML = '';
    document.getElementById('modal-nuevo').classList.add('open');
  });

  let _nuevoCasoAttachFiles = [];

  function _onNuevoCasoAttach(input) {
    Array.from(input.files || []).forEach(f => _nuevoCasoAttachFiles.push(f.name));
    input.value = '';
    _renderNuevoCasoAttachList();
  }

  function _renderNuevoCasoAttachList() {
    const list = document.getElementById('nuevo-caso-attach-list');
    list.innerHTML = _nuevoCasoAttachFiles.map((name, i) => `
      <span class="nuevo-caso-attach-chip">
        ${name}
        <button type="button" onclick="_quitarNuevoCasoAttach(${i})" title="Quitar">×</button>
      </span>
    `).join('');
  }

  function _quitarNuevoCasoAttach(i) {
    _nuevoCasoAttachFiles.splice(i, 1);
    _renderNuevoCasoAttachList();
  }

  function closeModal() {
    document.getElementById('modal-nuevo').classList.remove('open');
  }

  document.getElementById('modal-nuevo').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Misma sintaxis que el resto de las fechas mock ("27 jun 2026", "09:50 hs"), para que
  // dateToTs() la parsee bien y el caso nuevo respete el orden vigente (sortRows/sortDir).
  function _fechaHoraActual() {
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const now = new Date();
    const dia = String(now.getDate()).padStart(2, '0');
    const hh  = String(now.getHours()).padStart(2, '0');
    const mm  = String(now.getMinutes()).padStart(2, '0');
    return {
      fecha: `${dia} ${meses[now.getMonth()]} ${now.getFullYear()}`,
      hora: `${hh}:${mm} hs`,
    };
  }

  function _siguienteTicket() {
    let max = 0;
    document.querySelectorAll('[data-ticket]').forEach(el => {
      const n = parseInt((el.dataset.ticket || '').replace('#', ''), 10);
      if (!isNaN(n) && n > max) max = n;
    });
    const guardado = parseInt(localStorage.getItem('cw_ticket_counter') || '0', 10);
    const siguiente = Math.max(max, guardado) + 1;
    localStorage.setItem('cw_ticket_counter', String(siguiente));
    return `#${siguiente}`;
  }

  // Bandeja (o sub-bandeja) → mensaje de bienvenida configurado en admin.html, con el chip
  // "N° de caso" reemplazado por el ticket real. Las sub-bandejas heredan el de su bandeja padre.
  function _mensajeBienvenidaPara(bandejaKey, ticket) {
    const parentKey = bandejaKey.includes('::') ? bandejaKey.split('::')[0] : bandejaKey;
    const bandeja = getBandejasDinamicas().find(b => b.key === parentKey);
    if (!bandeja || !bandeja.mensajeBienvenida) return null;
    return bandeja.mensajeBienvenida.replace(/<span class="var-chip"[^>]*>[^<]*<\/span>/gi, ticket);
  }

  async function crearCaso() {
    const nombre   = document.getElementById('nuevo-caso-nombre').value.trim();
    const apellido = document.getElementById('nuevo-caso-apellido').value.trim();
    const email    = document.getElementById('nuevo-caso-email').value.trim();
    const asunto   = document.getElementById('nuevo-caso-asunto').value.trim();
    const bandejaKey = document.getElementById('nuevo-caso-bandeja').value;
    const asignadoKey = document.getElementById('nuevo-caso-asignado').value;
    const estado   = document.getElementById('nuevo-caso-estado').value;
    if (!nombre || !apellido || !email || !asunto || !bandejaKey) {
      showToast('Completá nombre, apellido, email, asunto y bandeja');
      return;
    }

    const resolucionBandeja = _bandejaIdPorKey[bandejaKey];
    if (!resolucionBandeja) {
      showToast('Esa bandeja ya no existe, elegí otra');
      return;
    }

    const { data: numeroTicket, error: errorTicket } = await supabaseClient.rpc('centralweb_next_ticket', { empresa_uuid: EMPRESA_ID });
    if (errorTicket) {
      showToast('No se pudo crear el caso (error de numeración)');
      console.error(errorTicket);
      return;
    }
    const ticket = `#${numeroTicket}`;

    const mensajeInicialHTML = document.getElementById('nuevo-caso-mensaje').innerHTML.trim();

    const { data: casoInsertado, error: errorCaso } = await supabaseClient
      .from('centralweb_casos')
      .insert({
        empresa_id: EMPRESA_ID,
        ticket,
        estado,
        bandeja_id: resolucionBandeja.id,
        sub_bandeja_id: resolucionBandeja.subId,
        asunto,
        from_name: `${nombre} ${apellido}`,
        from_email: email,
        asignado_user_id: asignadoKey || null,
        mensaje_inicial: mensajeInicialHTML,
      })
      .select()
      .single();

    if (errorCaso) {
      showToast('No se pudo guardar el caso en la base');
      console.error(errorCaso);
      return;
    }

    const { fecha, hora } = _fechaHoraActual();
    const d = {
      subject: asunto,
      from: `${nombre} ${apellido} <${email}>`,
      ticket, status: estado,
      subBandeja: bandejaKey,
      date: fecha, time: hora,
      unread: true,
    };
    tbody.insertAdjacentHTML('afterbegin', buildRow(d));

    if (asignadoKey) {
      _asignadoMap[ticket] = asignadoKey;
      _bandejaDisplayMap[ticket] = bandejaKey;
      const map = getBandejaMap();
      map[ticket] = asignadoKey;
      saveBandejaMap(map);
      const tr = tbody.querySelector(`tr[data-ticket="${ticket}"]`);
      if (tr) tr.dataset.bandeja = asignadoKey;
      const cell = tbody.querySelector(`tr[data-ticket="${ticket}"] .td-asignado`);
      if (cell) cell.innerHTML = buildAsignadoCell(ticket);
      saveAsignadoMap();
      saveBandejaDisplayMap();
    }

    _guardarCasoCreado(d);

    const bienvenida = _mensajeBienvenidaPara(bandejaKey, ticket);
    if (bienvenida) localStorage.setItem('cw_bienvenida_' + ticket, bienvenida);

    // Mensaje inicial y adjuntos cargados en el modal → se guardan para que caso-detalle.html
    // (todavía no migrado a Supabase) los muestre como el correo entrante real de este caso.
    localStorage.setItem('cw_mensaje_inicial_' + ticket, JSON.stringify({
      texto: mensajeInicialHTML,
      adjuntos: _nuevoCasoAttachFiles.slice(),
    }));

    sortRows();
    applyVisibility();
    recountFilters();
    updateBandejaCounts();
    updateUnreadBadge();
    _persistAllCases();
    closeModal();
    showCasoCreadoToast(ticket);
  }

  // ════════════════════════════════
  //  TOAST
  // ════════════════════════════════
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  function showCasoCreadoToast(ticket) {
    const t = document.getElementById('toast');
    t.innerHTML = `
      <span>Caso ${ticket} creado correctamente</span>
      <button type="button" class="toast-copy-btn" onclick="_copiarTicket('${ticket}', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span class="toast-copy-label">Copiar N°</span>
      </button>`;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
  }

  function _copiarTicket(ticket, btn) {
    navigator.clipboard?.writeText(ticket).catch(() => {});
    const label = btn.querySelector('.toast-copy-label');
    if (!label) return;
    label.textContent = '¡Copiado!';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 1400);
  }

  // ════════════════════════════════
  //  DISPONIBLE TOGGLE
  // ════════════════════════════════
  const dispBtn   = document.getElementById('disponible-btn');
  const dispBadge = document.getElementById('disponible-badge');
  let online = localStorage.getItem('cw_disponible') !== 'off';

  function applyDisponible() {
    dispBadge.textContent = online ? 'ON' : 'OFF';
    document.getElementById('status-dot').style.background = online ? '#22c55e' : '#94a3b8';
    dispBadge.style.background = online ? '#22c55e' : '#475569';
  }

  dispBtn.addEventListener('click', () => {
    online = !online;
    localStorage.setItem('cw_disponible', online ? 'on' : 'off');
    applyDisponible();
  });

  applyDisponible();

  // Persiste todos los casos (estáticos + pool) para que caso-detalle.html
  // pueda armar el histórico de un remitente con la totalidad de sus casos,
  // sin importar si viven en el HTML estático o en el pool simulado.
  function _persistAllCases() {
    const all = {};
    tbody.querySelectorAll('tr[data-ticket]').forEach(tr => {
      const fromRaw   = tr.querySelector('.from-line')?.textContent.replace('De: ', '').trim() || '';
      const fromMatch = fromRaw.match(/^(.+?)\s*<(.+?)>$/);
      const num = tr.dataset.ticket.replace('#', '');
      all[num] = {
        ticket:    tr.dataset.ticket,
        estado:    tr.dataset.status,
        bandeja:   tr.dataset.bandeja,
        asunto:    tr.querySelector('.subject-line')?.textContent.trim() || '',
        fromName:  fromMatch ? fromMatch[1].trim() : fromRaw,
        fromEmail: (fromMatch ? fromMatch[2].trim() : '').toLowerCase(),
        date:      tr.querySelector('.date')?.textContent.trim() || '',
        time:      tr.querySelector('.time')?.textContent.trim() || '',
        asignado:  tr.querySelector('.td-asignado')?.textContent.trim() || 'Sin asignar',
      };
    });
    localStorage.setItem('cw_all_cases', JSON.stringify(all));
  }

  // Casos dados de alta con "+ Nuevo Caso": el POOL/HTML estático no los conoce,
  // así que se guardan aparte para volver a insertarlos al recargar la página.
  function getCasosCreados() {
    try { return JSON.parse(localStorage.getItem('cw_casos_creados') || '[]'); } catch (e) { return []; }
  }
  function _guardarCasoCreado(d) {
    const casos = getCasosCreados();
    casos.push(d);
    localStorage.setItem('cw_casos_creados', JSON.stringify(casos));
  }

  // ════════════════════════════════
  //  INIT
  // ════════════════════════════════
  // Carga los casos reales de la empresa (traídos de Supabase al principio del script)
  CASOS_REALES.forEach(d => tbody.insertAdjacentHTML('beforeend', buildRow(d)));
  loaded = TOTAL;
  applyBandejaMap();
  applyStatusMap();
  applyAsignadoMap();
  applyReadState();
  _persistAllCases();
  setActiveTab('bandeja');
  renderTabs();
  sortRows();
  const _savedSel = localStorage.getItem('cw_selection');
  // Si el usuario activo (simulado con "Ver como") no tiene acceso a la bandeja guardada, redirigir a la primera accesible
  if (activeBandeja !== 'asignados' && !_esUsuarioKey(activeBandeja) && !tieneAccesoBandeja(activeBandeja)) {
    activeBandeja = getBandejasAccesibles()[0]?.key || getSubbandejasAccesibles()[0]?.key || 'asignados';
  }
  setBandeja(activeBandeja);
  if (_savedSel) localStorage.setItem('cw_selection', _savedSel);
  restoreSelection();
  updateUnreadBadge();

  // Restaura filtro de estado activo
  if (activeFilter) {
    const btn = document.querySelector(`.status-filter[data-status="${activeFilter}"]`);
    if (btn) btn.classList.add('active');
  }

  // Restaura "incluir cerrados" (queda tildado hasta que se cambie de bandeja/usuario)
  if (localStorage.getItem('cw_incluir_cerrados') === '1') {
    showCerrados = true;
    incluirCerrados.checked = true;
    applyVisibility();
    recountFilters();
  }

  // Restaura la búsqueda activa (queda en pantalla hasta que se cambie de bandeja/usuario)
  const _savedSearch = localStorage.getItem('cw_search_query');
  if (_savedSearch) {
    searchInput.value = _savedSearch;
    _runSearch();
  }

  // El HTML usa onclick="funcion()" en varios lugares (estáticos y generados por JS), y eso
  // se resuelve en el scope global — como todo este script ahora corre adentro de una función
  // async (para poder usar await), hay que exponer esas funciones puntuales en window.
  Object.assign(window, {
    scrollToLastCase, toggleBandejaMenu, toggleUsuariosEnBandeja, toggleConfigMenu,
    bulkEstado, closeModal, crearCaso, _toggleRowCheckbox, switchTab, closeTab,
    transferCases, _quitarNuevoCasoAttach, _copiarTicket, closeTransferModal, revertCases,
    _onNuevoCasoAttach,
  });
  _ocultarOverlayCarga();
})();
</script>

<div id="transfer-modal-backdrop" onclick="if(event.target===this)closeTransferModal()">

    <div id="transfer-modal-header">
      <h3>Transferir casos</h3>
      <button onclick="closeTransferModal()">×</button>
    </div>
    <div id="transfer-modal-body">
      <div class="tm-section-title">Bandejas</div>
      <div id="transfer-bandejas-list"></div>
      <div id="transfer-subbandejas-list"></div>
      <div class="tm-divider"></div>
      <div id="tm-revert-section" style="display:none">
        <div class="tm-item revert" onclick="revertCases()">
          <span class="tm-revert-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M3 10h10a8 8 0 010 16H3"/><polyline points="3 6 7 10 3 14"/></svg></span>
          <span>Devolver a la bandeja</span>
        </div>
        <div class="tm-divider"></div>
      </div>
      <div class="tm-section-title">Usuarios</div>
      <div id="transfer-users-list"></div>
    </div>
  </div>
</div>
</body>
