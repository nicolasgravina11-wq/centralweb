<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CentralWeb — Gestión de Casos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0a1628;
      --blue-900:  #0d2244;
      --blue-800:  #0e3a6e;
      --blue-700:  #1352a8;
      --blue-600:  #1a6cd4;
      --blue-500:  #2183f0;
      --blue-400:  #4fa3f7;
      --blue-300:  #7cc2fb;
      --blue-200:  #bfdffd;
      --blue-100:  #e8f3fe;
      --blue-50:   #f4f9ff;
      --sidebar-w: 220px;
      --header-h:  60px;
      --text-primary:   #0d1f3c;
      --text-secondary: #4a6285;
      --text-muted:     #8ba4c4;
      --border:         #d0e2f7;
      --bg:             #f0f5fc;
      --white:          #ffffff;
      --shadow-sm: 0 1px 3px rgba(13,34,68,.07), 0 1px 2px rgba(13,34,68,.04);
      --shadow-md: 0 4px 12px rgba(13,34,68,.10), 0 2px 6px rgba(13,34,68,.06);
      --shadow-lg: 0 10px 30px rgba(13,34,68,.14);
      --amber:       #f0a82c;
      --amber-dark:  #d6921a;
      --amber-text:  #412402;
      --accent:       #2456C9;
      --accent-light: #4C8DFF;
    }

    body {
      font-family: 'Manrope', 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── DISPONIBLE BTN (topbar) ── */
    .disponible-topbar-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 13px 6px 6px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      color: white;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      user-select: none;
    }
    .disponible-topbar-btn:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.35); }
    .disp-sep { width: 1px; height: 16px; background: rgba(255,255,255,.25); flex-shrink: 0; }
    .user-badge-avatar {
      font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .disponible-topbar-btn .disp-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .disponible-topbar-btn .disp-badge {
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 20px;
    }

    /* ── USUARIOS FLOTANTE (desde bandeja menu) ── */
    .bandeja-usuarios-item {
      position: relative;
    }
    .usuarios-hover-panel {
      display: none;
      position: absolute;
      left: 100%; top: 0;
      width: 220px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      max-height: 280px;
      overflow-y: auto;
      z-index: 200;
      padding: 6px 0;
    }
    .usuarios-hover-panel.open { display: block; }
    .usuarios-hover-panel::-webkit-scrollbar { width: 4px; }
    .usuarios-hover-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .usuario-hover-row {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background .12s;
      font-size: 13px; font-weight: 500; color: var(--text-primary);
    }
    .usuario-hover-row:hover { background: var(--blue-50); }
    .usuario-hover-row.offline { color: var(--text-muted); }
    .usuario-hover-row .uav {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
      position: relative;
    }
    .usuario-hover-row .uav .udot {
      position: absolute; bottom: -1px; right: -1px;
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid white;
    }
    .usuario-hover-row .ucount {
      margin-left: auto; font-size: 11px; font-weight: 700;
      background: var(--blue-100); color: var(--blue-700);
      border-radius: 10px; padding: 1px 7px; min-width: 18px; text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: var(--header-h);
      background: var(--blue-900);
      border-bottom: none;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
    }

    .page-title {
      font-family: 'Space Grotesk', 'Manrope', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: white;
      display: flex; align-items: center; gap: 8px;
    }
    .page-title svg { width: 28px; height: 28px; color: var(--blue-300); }

    .topbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,.15); margin: 0 4px; }

    .bandeja-select {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 5px;
      padding: 8px 16px;
      min-width: 170px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .bandeja-select:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.35); }
    .bandeja-select svg { width: 14px; height: 14px; }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn svg { width: 15px; height: 15px; }

    .btn-primary {
      background: var(--blue-600);
      color: white;
    }
    .btn-primary:hover {
      background: var(--blue-700);
    }

    #btn-nuevo-caso {
      background: var(--accent);
      color: white;
      box-shadow: 0 6px 16px rgba(36,86,201,.3);
    }
    #btn-nuevo-caso:hover {
      background: var(--blue-700);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--blue-50); border-color: var(--blue-300); color: var(--blue-700); }

    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      cursor: pointer;
      color: rgba(255,255,255,.85);
      transition: all .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.4); color: white; }
    .icon-btn svg { width: 16px; height: 16px; }

    .notif-btn { position: relative; }
    .notif-dot {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: #f87171;
      border-radius: 50%;
      border: 2px solid var(--blue-700);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .checkbox-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
    }
    #selectAll-wrap input[type="checkbox"] { display: none; }
    .custom-check-box {
      width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
      border: 1.5px solid #94a3b8; background: white;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .custom-check-box svg { width: 11px; height: 11px; display: none; stroke: white; }
    .checkbox-wrap.has-selection .custom-check-box {
      background: var(--blue-600); border-color: var(--blue-600);
    }
    .checkbox-wrap.has-selection .custom-check-box svg { display: block; }
    input[type="checkbox"] { accent-color: var(--blue-600); width: 14px; height: 14px; cursor: pointer; }

    .search-wrap {
      flex: 1; max-width: 320px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text-muted);
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 12px 7px 34px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--blue-50);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--blue-400); box-shadow: 0 0 0 3px rgba(33,131,240,.10); background: white; }
    .search-wrap input::placeholder { color: var(--text-muted); }

    .toolbar-sep { width: 1px; height: 24px; background: var(--border); }

    .btn-transfer {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-transfer:hover:not(:disabled) { border-color: var(--blue-400); color: var(--blue-700); background: var(--blue-50); }
    .btn-transfer svg { width: 14px; height: 14px; }
    .btn-transfer:disabled,
    .estado-select.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

    .estado-select {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .estado-select:hover { border-color: var(--blue-400); color: var(--blue-700); background: var(--blue-50); }
    .estado-select svg { width: 12px; height: 12px; }

    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

    .sort-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: white;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all .15s;
    }
    .sort-btn:hover { background: var(--blue-50); border-color: var(--blue-300); color: var(--blue-700); }
    .sort-btn svg { width: 15px; height: 15px; }

    /* ── TABLE ── */
    .table-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .table-container {
      background: white;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: var(--blue-50);
      border-bottom: 1.5px solid var(--border);
    }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }
    th:first-child { padding-left: 20px; }
    th:last-child { padding-right: 20px; text-align: right; }

    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--blue-700); }
    th svg { width: 12px; height: 12px; vertical-align: middle; margin-left: 3px; color: var(--text-muted); }

    tbody tr {
      border-bottom: 1px solid var(--blue-50);
      transition: background .12s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--blue-50); }
    tbody tr.unread { background: rgba(33,131,240,.04); }
    tbody tr.unread:hover { background: rgba(33,131,240,.08); }
    tbody tr.ultimo-visto { background: rgba(13,34,68,.12); transition: background 1.2s ease; }
    tbody tr.ultimo-visto:hover { background: rgba(13,34,68,.18); }
    tbody tr.ultimo-visto.fading { background: transparent; }
    tbody tr.sin-acceso-bandeja { opacity: .5; cursor: not-allowed; }
    tbody tr.sin-acceso-bandeja:hover { background: transparent; }

    td {
      padding: 10px 16px;
      font-size: 13.5px;
      vertical-align: middle;
    }
    td:first-child { padding-left: 20px; }
    td:last-child { padding-right: 20px; text-align: right; }

    .td-check { width: 40px; }
    .td-icon { width: 44px; }
    .td-subject { min-width: 240px; }
    .td-ticket { width: 110px; }
    .td-estado { width: 120px; }
    .td-usuario { width: 160px; }
    .td-fecha { width: 130px; }

    .mail-icon {
      width: 34px; height: 34px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mail-icon.unread { background: var(--blue-600); }
    .mail-icon.read   { background: var(--blue-100); }
    .mail-icon svg    { width: 16px; height: 16px; }
    .mail-icon.unread svg { fill: white; }
    .mail-icon.read svg   { fill: var(--blue-400); }

    .subject-line { font-weight: 500; color: var(--text-secondary); font-size: 13.5px; margin-bottom: 2px; }
    .from-line    { font-size: 12px; color: var(--text-muted); }

    /* Unread state: todo en negrita y color más fuerte */
    tbody tr.unread .subject-line { font-weight: 700; color: var(--text-primary); }
    tbody tr.unread .from-line    { font-weight: 600; color: var(--text-secondary); }
    tbody tr.unread .ticket-num   { font-weight: 800; background: var(--blue-200); color: var(--blue-800); }
    tbody tr.unread .fecha-cell .date { font-weight: 700; }
    tbody tr.unread .fecha-cell .time { font-weight: 600; color: var(--text-secondary); }

    tbody tr.en-gracia { opacity: .5; background: #dde2e9; }
    tbody tr.en-gracia:hover { background: #d2d8e0; }
    .badge-transferido {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 700;
      color: #b45309; background: #fef3c7;
      border-radius: 5px; padding: 2px 7px;
      margin-left: 6px; white-space: nowrap;
    }

    .ticket-num {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--blue-700);
      background: var(--blue-100);
      padding: 3px 9px;
      border-radius: 6px;
      display: inline-block;
    }

    /* STATUS BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-abierto  { background: #fde8e8; color: #b91c1c; }
    .badge-abierto::before { background: #f87171; }

    .badge-espera   { background: #e0f5ff; color: #0369a1; }
    .badge-espera::before { background: #38bdf8; }

    .badge-cerrado  { background: #f1f5f9; color: #475569; }
    .badge-cerrado::before { background: #94a3b8; }

    /* USUARIO CELL */
    .user-cell { display: flex; align-items: center; gap: 8px; }
    .mini-avatar {
      font-family: 'JetBrains Mono', monospace;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .user-cell-info .name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .user-cell-info .bandeja { font-size: 11.5px; color: var(--text-muted); }
    .sin-asignar { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* FECHA */
    .fecha-cell .date { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .fecha-cell .time { font-size: 11.5px; color: var(--text-muted); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
    }
    .empty-icon {
      width: 64px; height: 64px;
      margin: 0 auto 18px;
      background: var(--blue-100);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon svg { width: 30px; height: 30px; fill: var(--blue-400); }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .empty-desc  { font-size: 13.5px; color: var(--text-muted); }

    /* STATUS FILTER BUTTONS */
    .status-filter {
      position: relative;
      width: 28px; height: 28px;
      border-radius: 5px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-filter:hover { transform: scale(1.12); }
    .status-filter.active { border-color: var(--blue-700); box-shadow: 0 0 0 3px rgba(26,108,212,.15); }
    .status-filter-count {
      position: absolute;
      bottom: -7px; right: -7px;
      background: var(--navy);
      color: white;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 8px;
      display: none;
      pointer-events: none;
    }
    .status-filter.active .status-filter-count { display: block; }

    /* SCROLLBAR */
    .table-wrap::-webkit-scrollbar { width: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: transparent; }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 3px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--blue-300); }

    /* PRIORITY DOT on row */
    .priority { width: 4px; height: 36px; border-radius: 2px; margin: -13px 0; }
    .priority.alta  { background: #ef4444; }
    .priority.media { background: #f59e0b; }
    .priority.baja  { background: #22c55e; }

    /* ── CASE TABS ── */
    #case-tabs { display: flex; align-items: center; gap: 5px; }
    .case-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px 5px 12px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: all .15s;
      max-width: 180px;
    }
    .case-tab:hover { background: rgba(255,255,255,.18); color: white; }
    .case-tab.active { background: white; color: var(--blue-800); border-color: white; }
    .case-tab .tab-label { overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .tab-close {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; border: none;
      background: transparent; color: inherit;
      font-size: 15px; line-height: 1; cursor: pointer;
      opacity: .5; font-family: inherit;
      transition: opacity .12s, background .12s;
    }
    .tab-close:hover { opacity: 1; background: rgba(0,0,0,.12); }
    .case-tab.active .tab-close:hover { background: rgba(0,0,0,.08); }

    /* ── BANDEJA DROPDOWN ── */
    .bandeja-wrap { position: relative; }
    .bandeja-menu {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--navy);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      min-width: 210px;
      max-height: 70vh;
      z-index: 300;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .bandeja-menu.open { display: block; }
    .bandeja-menu-title {
      padding: 10px 14px 6px;
      font-size: 10px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: rgba(255,255,255,.4);
    }
    .bandeja-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,.75);
      cursor: pointer;
      transition: background .12s;
    }
    .bandeja-item:hover, .bandeja-item.hovered { background: rgba(255,255,255,.08); color: white; }
    .bandeja-item.active { background: var(--blue-700); color: white; }
    .bandeja-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .7; }
    .bandeja-item.active svg { opacity: 1; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
async function cerrarSesion() {
  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
      await supabaseClient.from('profiles').update({ last_seen: null }).eq('id', user.id);
    }
  } catch (e) { /* silencioso */ }
  try {
    await supabaseClient.auth.signOut();
  } catch (e) {
    console.error('Error al cerrar sesion:', e.message);
  }
  Object.keys(localStorage).filter(k => k.startsWith('cw_')).forEach(k => localStorage.removeItem(k));
  window.location.href = 'login.html';
}

function _ocultarOverlayCarga() { try { var ov = document.getElementById('cw-loading-overlay'); if (ov) ov.style.display = 'none'; } catch (eOv) {} }
setTimeout(_ocultarOverlayCarga, 4000);
(async function () {
  // ════════════════════════════════
  //  SESION REAL (Supabase) — reemplaza el viejo gate de localStorage
  // ════════════════════════════════
  // getSession() puede devolver null por una carrera interna del cliente justo
  // despues de venir de login.html (todavia no termino de leer el storage).
  // Por eso reintentamos una vez antes de mandar a login, y ademas guardamos
  // un "guard" para no quedar rebotando en loop entre casos.html <-> login.html
  // si de verdad no hay sesion.
  let { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    await new Promise(r => setTimeout(r, 400));
    ({ data: { session } } = await supabaseClient.auth.getSession());
  }
  if (!session) {
    if (sessionStorage.getItem('cw_redirect_guard') === '1') {
      sessionStorage.removeItem('cw_redirect_guard');
      document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif">No pudimos confirmar tu sesión. <a href="login.html">Volvé a iniciar sesión</a>.</div>';
      return;
    }
    sessionStorage.setItem('cw_redirect_guard', '1');
    window.location.href = 'login.html';
    return;
  }
  sessionStorage.removeItem('cw_redirect_guard');

  const { data: perfil, error: errorPerfil } = await supabaseClient
    .from('profiles')
    .select('*')
    .eq('id', session.user.id)
    .single();
  if (errorPerfil || !perfil) { window.location.href = 'login.html'; return; }

  const EMPRESA_ID = perfil.empresa_id; const CURRENT_USER_ID = session.user.id;

  // ── Evita heredar pestañas/filtros/selecciones de OTRO usuario que haya
  // iniciado sesión antes en este mismo navegador (localStorage es por
  // dominio, no por usuario). Si el usuario logueado cambió, limpiamos
  // todo el estado visual "cw_*" antes de que se lea/renderice.
  const _cwUsuarioGuardado = localStorage.getItem('cw_usuario_activo');
  if (_cwUsuarioGuardado !== CURRENT_USER_ID) {
    Object.keys(localStorage)
      .filter(k => k.startsWith('cw_') && k !== 'cw_usuario_activo')
      .forEach(k => localStorage.removeItem(k));
  }
  localStorage.setItem('cw_usuario_activo', CURRENT_USER_ID);

  const [{ data: bandejasDB }, { data: usuariosDB }, { data: permisosDB }, { data: casosDB }] = await Promise.all([
    supabaseClient.from('centralweb_bandejas').select('*').eq('empresa_id', EMPRESA_ID),
    supabaseClient.from('profiles').select('*').eq('empresa_id', EMPRESA_ID),
    supabaseClient.from('centralweb_permisos').select('*').eq('empresa_id', EMPRESA_ID),
    supabaseClient.from('centralweb_casos').select('*').eq('empresa_id', EMPRESA_ID).order('creado_en', { ascending: true }),
  ]);

  // Mapa id -> bandeja (para resolver bandeja_id/sub_bandeja_id de cada caso a su "key")
  const _bandejaPorId = {};
  (bandejasDB || []).forEach(b => { _bandejaPorId[b.id] = b; });

  // Mapa key (o "padre::hija") -> {id, parentId} — para resolver en sentido inverso al crear un caso nuevo
  const _bandejaIdPorKey = {};
  (bandejasDB || []).forEach(b => {
    if (b.parent_id) {
      const padre = _bandejaPorId[b.parent_id];
      if (padre) _bandejaIdPorKey[`${padre.key}::${b.key}`] = { id: padre.id, subId: b.id };
    } else {
      _bandejaIdPorKey[b.key] = { id: b.id, subId: null };
    }
  });

  // Construye la misma forma que antes usaba localStorage (bandejas con subbandejas anidadas)
  const BANDEJAS_DINAMICAS = (bandejasDB || [])
    .filter(b => !b.parent_id)
    .map(b => ({
      key: b.key,
      nombre: b.nombre,
      mensajeBienvenida: b.mensaje_bienvenida,
      subbandejas: (bandejasDB || [])
        .filter(s => s.parent_id === b.id)
        .map(s => ({ key: s.key, nombre: s.nombre, _id: s.id, _parentId: b.id })),
      _id: b.id,
    }));

  const GRADIENTES_DB = [
    'linear-gradient(135deg,#1a6cd4,#4fa3f7)',
    'linear-gradient(135deg,#7c3aed,#a78bfa)',
    'linear-gradient(135deg,#059669,#34d399)',
    'linear-gradient(135deg,#dc2626,#f87171)',
    'linear-gradient(135deg,#d97706,#fbbf24)',
    'linear-gradient(135deg,#0891b2,#67e8f9)',
  ];
  const USUARIOS_DINAMICOS = (usuariosDB || []).map((u, i) => ({
    key: u.id,
    initials: u.iniciales || (u.nombre || '?').slice(0, 1).toUpperCase(),
    name: `${u.nombre || ''} ${u.apellido || ''}`.trim(),
    gradient: u.gradiente || GRADIENTES_DB[i % GRADIENTES_DB.length],
    rol: u.rol || 'Agente',
    last_seen: u.last_seen || null,
  }));

  // Badge con el nombre del usuario logueado (informativo, junto a "Disponible")
  (function _pintarBadgeUsuario() {
    const info = USUARIOS_DINAMICOS.find(u => u.key === CURRENT_USER_ID);
    const avatarEl = document.getElementById('user-badge-avatar');
    const nameEl = document.getElementById('user-badge-name');
    if (!info || !avatarEl || !nameEl) return;
    avatarEl.style.background = info.gradient;
    avatarEl.textContent = info.initials;
    nameEl.textContent = info.name;
  })();

  // Permisos: bandeja_id -> user_id -> {acceso, ver_otros}
  const PERMISOS_DINAMICOS = {};
  (permisosDB || []).forEach(p => {
    const bandeja = _bandejaPorId[p.bandeja_id];
    if (!bandeja) return;
    const parentKey = bandeja.parent_id ? _bandejaPorId[bandeja.parent_id]?.key : bandeja.key;
    if (!parentKey) return;
    PERMISOS_DINAMICOS[parentKey] = PERMISOS_DINAMICOS[parentKey] || {};
    PERMISOS_DINAMICOS[parentKey][p.user_id] = { acceso: p.acceso, ver_otros: p.ver_otros };
  });

  const MESES_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function _formatFechaHora(iso) {
    const d = new Date(iso);
    const dia = String(d.getDate()).padStart(2, '0');
    const hh  = String(d.getHours()).padStart(2, '0');
    const mm  = String(d.getMinutes()).padStart(2, '0');
    return {
      fecha: `${dia} ${MESES_ES[d.getMonth()]} ${d.getFullYear()}`,
      hora: `${hh}:${mm} hs`,
    };
  }

  function _bandejaKeyReal(c) {
    const bandeja = _bandejaPorId[c.bandeja_id];
    if (!bandeja) return null;
    if (c.sub_bandeja_id) {
      const sub = _bandejaPorId[c.sub_bandeja_id];
      if (sub) return `${bandeja.key}::${sub.key}`;
    }
    return bandeja.key;
  }

  // La bandeja real (de donde salen permisos y config de respuesta) nunca cambia por asignar el caso a un usuario:
  // asignar es solo visualizacion (en que carpeta aparece), no mueve el caso de bandeja.
  function _bandejaKeyDeCaso(c) {
    if (c.asignado_user_id) return c.asignado_user_id; // se archiva en la carpeta del usuario asignado
    return _bandejaKeyReal(c);
  }

  const _readSetInicial = (() => {
    try { return new Set(JSON.parse(localStorage.getItem('cw_read') || '[]')); } catch { return new Set(); }
  })();

  // Reconciliar el mapa local de estados con el estado real de Supabase.
  // Sin esto, un caso reabierto por el backend (ej: respuesta del cliente a un caso cerrado)
  // seguia mostrandose como "Cerrado" indefinidamente porque applyStatusMap() confiaba
  // ciegamente en el valor guardado en localStorage, sin importar cuan viejo fuera.
  // Nota: se lee/escribe localStorage directamente (no getStatusMap/saveStatusMap) porque
  // este bloque corre antes de que la variable de modulo _statusMap se inicialice.
  {
    let _mapaSync = {};
    try { _mapaSync = JSON.parse(localStorage.getItem('cw_status_map') || '{}'); } catch {}
    let _mapaCambio = false;
    (casosDB || []).forEach(c => {
      if (c.ticket && c.estado && _mapaSync[c.ticket] !== c.estado) { _mapaSync[c.ticket] = c.estado; _mapaCambio = true; }
    });
    if (_mapaCambio) { try { localStorage.setItem('cw_status_map', JSON.stringify(_mapaSync)); } catch {} }
  }

  const CASOS_REALES = (casosDB || []).map(c => {
    const { fecha, hora } = _formatFechaHora(c.creado_en);
    return {
      _id: c.id,
      ticket: c.ticket,
      status: c.estado,
      subBandeja: _bandejaKeyDeCaso(c) || 'sin-bandeja',
      realBandeja: _bandejaKeyReal(c) || 'sin-bandeja',
      subject: c.asunto || '(sin asunto)',
      from: `${c.from_name || ''} <${c.from_email || ''}>`.trim(),
      date: fecha, time: hora,
      unread: !c.leido,
    };
  });

  let _ultimoVistoTimer = null;
  function aplicarUltimoVisto() {
    const ticket = localStorage.getItem('cw_ultimo_visto');
    if (!ticket) return;
    document.querySelectorAll('tbody tr.ultimo-visto').forEach(tr => tr.classList.remove('ultimo-visto', 'fading'));
    const tr = document.querySelector(`tbody tr[data-ticket="${ticket}"]`);
    if (!tr) return;
    tr.classList.add('ultimo-visto');
    if (_ultimoVistoTimer) clearTimeout(_ultimoVistoTimer);
    _ultimoVistoTimer = setTimeout(() => {
      tr.classList.add('fading');
      setTimeout(() => tr.classList.remove('ultimo-visto', 'fading'), 1200);
    }, 15000);
  }

  function aplicarLeidos() {
    // No-op: el estado leido ahora es global (Supabase, columna leido) y se aplica
    // directamente al renderizar cada fila (ver CASOS_REALES / unread: !c.leido).
  }
  function reabrirPorRespuesta(ticket) {
    // Cambia estado a abierto
    const map = getStatusMap();
    map[ticket] = 'abierto';
    saveStatusMap(map);

    // Marca como no leído
    const read = getReadSet();
    read.delete(ticket);
    localStorage.setItem('cw_read', JSON.stringify([...read]));

    // Actualiza DOM si la fila ya está renderizada
    const tr = tbody.querySelector(`tr[data-ticket="${ticket}"]`);
    if (tr) {
      tr.dataset.status = 'abierto';
      tr.querySelector('td:nth-child(5)').innerHTML = badgeMap['abierto'];
      tr.classList.add('unread');
      tr.querySelector('.mail-icon')?.classList.replace('read', 'unread');
    }

    applyVisibility();
    recountFilters();
    updateUnreadBadge();
    _persistAllCases();
    showToast(`Caso ${ticket} reabierto por nueva respuesta del cliente`);
  }

  function procesarReaperturasPendientes() {
    const ticket = localStorage.getItem('cw_reabrir_ticket');
    if (!ticket) return;
    localStorage.removeItem('cw_reabrir_ticket');
    reabrirPorRespuesta(ticket);
  }

  function scrollToLastIfPending() {
    if (!localStorage.getItem('cw_scroll_to_last')) return;
    localStorage.removeItem('cw_scroll_to_last');
    const ticket = localStorage.getItem('cw_ultimo_visto');
    if (!ticket) return;
    const row = tbody.querySelector(`tr[data-ticket="${ticket}"]`);
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Corre tanto en carga normal como al volver desde bfcache
  aplicarLeidos();
  aplicarUltimoVisto();
  window.addEventListener('pageshow', () => { procesarReaperturasPendientes(); aplicarLeidos(); aplicarUltimoVisto(); scrollToLastIfPending(); });

  // ════════════════════════════════
  //  DATA (real, desde Supabase — ver CASOS_REALES más arriba)
  // ════════════════════════════════
  const avatarColors = {
    CP: 'linear-gradient(135deg,#1a6cd4,#4fa3f7)',
    LM: 'linear-gradient(135deg,#7c3aed,#a78bfa)',
    NG: 'linear-gradient(135deg,#0e5aa7,#2183f0)',
    SR: 'linear-gradient(135deg,#065f46,#10b981)',
    JF: 'linear-gradient(135deg,#b45309,#fbbf24)',
  };

  const badgeMap = {
    abierto: '<span class="badge badge-abierto">Abierto</span>',
    espera:  '<span class="badge badge-espera">Espera</span>',
    cerrado: '<span class="badge badge-cerrado">Cerrado</span>',
  };

  // ════════════════════════════════
  //  STATE
  // ════════════════════════════════
  const tbody        = document.querySelector('tbody');
  const selectAll    = document.getElementById('selectAll');
  const countEl      = document.getElementById('selectCount');
  const incluirCerrados = document.getElementById('incluir-cerrados');

  let loaded        = 0;
  let loading       = false;

  let searchQuery   = '';
  let showCerrados  = false;
  let activeBandeja = localStorage.getItem('cw_bandeja') || getBandejasDinamicas()[0]?.key || 'sin-bandeja';
  if (activeBandeja === 'todas' || activeBandeja === 'principal') activeBandeja = getBandejasDinamicas()[0]?.key || 'sin-bandeja'; // migración: "Bandeja principal" ya no existe como vista
  const TOTAL       = CASOS_REALES.length;

  // ════════════════════════════════
  //  BUILD ROW
  // ════════════════════════════════
  function buildRow(d) {
    const _accesoOk = tieneAccesoCaso(d.subBandeja, d.realBandeja);
    const _rowClasses = [d.unread ? 'unread' : '', _accesoOk ? '' : 'sin-acceso-bandeja'].filter(Boolean).join(' ');
    return `

        <td class="td-check" onclick="_toggleRowCheckbox(event, this)"><input type="checkbox" onclick="event.stopPropagation()" /></td>
        <td class="td-icon"><div class="mail-icon ${d.unread ? 'unread' : 'read'}">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

  }

  // ════════════════════════════════
  //  VISIBILITY (search + filter + cerrados)
  // ════════════════════════════════
  function rowVisible(tr) {
    const status  = tr.dataset.status;
    const bandeja = tr.dataset.bandeja;
    const q       = searchQuery.trim().toLowerCase();
    const ticket  = tr.dataset.ticket;
    // Margen de error: si acabás de cerrar este caso, sigue contando como visible
    // hasta que cambies de bandeja o filtres "Abierto" (aunque el filtro "Casos abiertos"
    // esté activo, que es lo más habitual mientras se navega una bandeja).
    const enGraciaCierre = status === 'cerrado' && !!(ticket && _graciaCierre[ticket]);

    // Modo búsqueda: muestra casos que coincidan, sin filtro de bandeja
    if (q) {
      if (status === 'cerrado' && !showCerrados && !enGraciaCierre) return false;
      return _rowMatchesQuery(tr, q);
    }

    if (!showCerrados && status === 'cerrado' && activeFilter !== 'cerrado' && !enGraciaCierre) return false;
    if (activeFilter && status !== activeFilter && !enGraciaCierre) return false;
    if (activeBandeja === 'asignados') {
      if (bandeja !== 'asignados' && bandeja !== CURRENT_USER_KEY) return false;
    } else {
      if (bandeja !== activeBandeja) {
        // Margen de error: si este caso se transfirió afuera de la bandeja que estás mirando,
        // sigue contando como visible hasta que cambies de bandeja o filtres "Abierto".
        if (!(ticket && _gracia[ticket] === activeBandeja)) return false;
      }
    }
    return true;
  }

  function _rowMatchesQuery(tr, q) {
    // Busca en: asunto, remitente, ticket, asignado
    const subject  = tr.querySelector('.subject-line')?.textContent.toLowerCase() || '';
    const from     = tr.querySelector('.from-line')?.textContent.toLowerCase() || '';
    const ticket   = (tr.dataset.ticket || '').toLowerCase();
    const asignado = tr.querySelector('.td-asignado')?.textContent.toLowerCase() || '';

    // Si la búsqueda es un número de ticket (con o sin '#'), matcheo EXACTO por ticket
    // en vez de "includes", para no traer casos cuyo email/asunto simplemente contenga
    // esos mismos dígitos como substring (ej: nicolas.gravina11@gmail.com al buscar "11").
    const qTicket = q.replace(/^#/, '');
    if (/^\d+$/.test(qTicket)) {
      return ticket.replace('#', '') === qTicket;
    }
    return subject.includes(q) || from.includes(q) || ticket.includes(q) || asignado.includes(q);
  }

  let _gracia = {};
  let _graciaCierre = {};

  function applyVisibility() {
    _gracia = getCasosEnGracia();
    _graciaCierre = getCierreEnGracia();
    const rows = [...tbody.querySelectorAll('tr')];
    let visible = 0;
    rows.forEach(tr => {
      const ticket = tr.dataset.ticket;
      if (ticket && _gracia[ticket] && tr.dataset.bandeja !== _gracia[ticket]) {
        _marcarFilaEnGracia(tr);
      }
      if (ticket && _graciaCierre[ticket] && tr.dataset.status === 'cerrado') {
        tr.classList.add('en-gracia');
      }
      const show = rowVisible(tr);
      tr.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    // empty state
    let empty = document.getElementById('empty-state-row');
    if (visible === 0) {
      if (!empty) {
        empty = document.createElement('tr');
        empty.id = 'empty-state-row';
        empty.innerHTML = `<td colspan="7">
          <div class="empty-state">
            <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
            <div class="empty-title">Sin resultados</div>
            <div class="empty-desc">No hay casos que coincidan con los filtros aplicados.</div>
          </div>
        </td>`;
        tbody.appendChild(empty);
      }
    } else {
      if (empty) empty.remove();
    }
  }

  // ════════════════════════════════
  //  INFINITE SCROLL
  // ════════════════════════════════
  function updateShownCount() { /* noop */ }

  function loadMore() {
    // Los casos reales se cargan todos de una sola vez desde Supabase (ver INIT);
    // no hay paginación por ahora, así que esto no tiene nada más que hacer.
    if (loading || loaded >= TOTAL) return;
    loading = true;
    document.getElementById('scroll-spinner').style.display = 'block';
    setTimeout(() => {
      loaded = TOTAL;
      document.getElementById('scroll-spinner').style.display = 'none';
      loading = false;
      applyStatusMap();
      aplicarLeidos();
      aplicarUltimoVisto();
      updateShownCount();
      sortRows();
      applyVisibility();
      recountFilters();
      if (loaded >= TOTAL) {
        document.getElementById('scroll-label').innerHTML =
          `<span style="color:var(--text-muted)">✓ Todos los <strong style="color:var(--text-primary)">${TOTAL}</strong> casos cargados</span>`;
      }
    }, 600);
  }

  const sentinel = document.getElementById('scroll-sentinel');
  new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { root: document.querySelector('.table-wrap'), threshold: 0 }).observe(sentinel);

  // ════════════════════════════════
  //  SEARCH
  // ════════════════════════════════
  const searchInput = document.querySelector('.search-wrap input');

  function _runSearch() {
    searchQuery = searchInput.value.trim();
    if (searchQuery) localStorage.setItem('cw_search_query', searchQuery);
    else localStorage.removeItem('cw_search_query');
    const label = document.getElementById('bandeja-label');
    if (searchQuery) {
      label.textContent = 'Resultados de búsqueda';
    } else {
      label.textContent = bandejaLabels[activeBandeja] || 'Bandeja principal';
    }
    applyVisibility();
    recountFilters();
  }

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') _runSearch();
  });

  // Al borrar el campo completamente, limpia la búsqueda en tiempo real
  searchInput.addEventListener('input', e => {
    if (e.target.value.trim() === '') _runSearch();
  });

  //  INCLUIR CERRADOS
  // ════════════════════════════════
  incluirCerrados.addEventListener('change', () => {
    showCerrados = incluirCerrados.checked;

  // ════════════════════════════════
  //  STATUS FILTER DOTS
  // ════════════════════════════════
  function recountFilters() {
    const counts = { abierto: 0, espera: 0, cerrado: 0 };
    // No usamos la constante CURRENT_USER_KEY acá porque esta función se llama
    // (line 1621) antes de que esa constante se declare más abajo en el script.
    const currentUserKey = localStorage.getItem('cw_usuario_activo') || 'user_ng';
    tbody.querySelectorAll('tr[data-ticket]').forEach(tr => {
      const bandeja = tr.dataset.bandeja;
      const matches = activeBandeja === 'asignados'
        ? (bandeja === 'asignados' || bandeja === currentUserKey)
        : (bandeja === activeBandeja);
      if (!matches) return;
      const s = tr.dataset.status;
      if (counts.hasOwnProperty(s)) counts[s]++;
    });
    ['abierto','espera','cerrado'].forEach(s => {
      document.getElementById(`cnt-${s}`).textContent = counts[s];
    });
  }
  recountFilters();

  document.querySelectorAll('.status-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      const status = btn.dataset.status;
      const isActive = btn.classList.contains('active');
      document.querySelectorAll('.status-filter').forEach(b => b.classList.remove('active'));
      if (status === 'abierto') {
        // El filtro "Casos abiertos" siempre limpia y muestra únicamente los abiertos,
        // nunca funciona como toggle (si no, al estar ya activo por defecto, apretarlo
        // lo desactivaba y mostraba también los casos en espera).
        _limpiarGracia();
        activeFilter = 'abierto';
        localStorage.setItem('cw_filtro', 'abierto');
        showCerrados = false;
        incluirCerrados.checked = false;
        localStorage.removeItem('cw_incluir_cerrados');
        btn.classList.add('active');
      } else {
        activeFilter = isActive ? null : status;
        localStorage.setItem('cw_filtro', activeFilter || '');
        if (!isActive) btn.classList.add('active');
      }
      applyVisibility();
    });
  });

  // ════════════════════════════════
  //  CHECKBOX + BULK
  // ════════════════════════════════
  function getRowChecks() { return [...document.querySelectorAll('tbody input[type="checkbox"]')]; }

  // Agranda el área clickeable de la casilla: togglea el checkbox aunque el clic
  // caiga en el padding de la celda y no justo en el input de 14x14.
  function _toggleRowCheckbox(e, td) {
    if (e.target.tagName === 'INPUT') return; // el input ya se togglea solo
    e.stopPropagation();
    const cb = td.querySelector('input[type="checkbox"]');
    if (!cb) return;
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change', { bubbles: true }));
  }

  function updateSelectCount() {
    const n = getRowChecks().filter(c => c.checked).length;
    countEl.textContent = n + ' selec.';
    const hasSelection = n > 0;
    document.getElementById('selectAll-wrap').classList.toggle('has-selection', hasSelection);
    document.getElementById('btn-transferir').disabled = !hasSelection;
    document.getElementById('estado-btn').classList.toggle('disabled', !hasSelection);
  }

  function saveSelection() {
    const selected = getRowChecks().filter(c => c.checked).map(c => c.closest('tr').dataset.ticket);
    localStorage.setItem('cw_selection', JSON.stringify(selected));
  }

  function restoreSelection() {
    try {
      const selected = JSON.parse(localStorage.getItem('cw_selection') || '[]');
      if (!selected.length) return;
      getRowChecks().forEach(c => {
        const tr = c.closest('tr');
        if (tr && selected.includes(tr.dataset.ticket)) c.checked = true;
      });
      updateSelectCount();
    } catch {}
  }

  function clearSelection(persistClear = true) {
    getRowChecks().forEach(c => c.checked = false);
    selectAll.checked = false;
    if (persistClear) localStorage.removeItem('cw_selection');
    updateSelectCount();
  }

  selectAll.addEventListener('change', () => {
    getRowChecks().forEach(c => {
      const tr = c.closest('tr');
      if (tr && tr.style.display !== 'none') c.checked = selectAll.checked;
    });
    saveSelection();
    updateSelectCount();
  });
  tbody.addEventListener('change', e => {
    if (e.target.type === 'checkbox') { saveSelection(); updateSelectCount(); }
  });

  // Fuente de verdad en memoria — localStorage es solo respaldo entre sesiones
  let _statusMap = {};
  try { _statusMap = JSON.parse(localStorage.getItem('cw_status_map') || '{}'); } catch {}

  function getStatusMap() { return _statusMap; }
  function saveStatusMap(map) {

  }

  }

  // ── Margen de error al transferir ──
  // Mientras estás mirando una bandeja, un caso que transferís a otro lado (desde la lista
  // o desde dentro del caso) sigue viéndose ahí —apagado y marcado "Transferido"— hasta que
  // cambiás de bandeja o tocás el filtro "Casos abiertos". Vive en sessionStorage (no en
  // localStorage) a propósito: es una ayuda visual de la sesión actual, no un estado real del
  // caso — si cerrás la pestaña del navegador, se pierde.
  function getCasosEnGracia() {
    try { return JSON.parse(sessionStorage.getItem('cw_casos_en_gracia') || '{}'); } catch (e) { return {}; }
  }
  function _marcarEnGracia(ticket, bandejaOriginal) {
    const g = getCasosEnGracia();
    g[ticket] = bandejaOriginal;
    sessionStorage.setItem('cw_casos_en_gracia', JSON.stringify(g));
    const tr = tbody.querySelector(`tr[data-ticket="${ticket}"]`);
    _marcarFilaEnGracia(tr);
  }
  function _marcarFilaEnGracia(tr) {
    if (!tr || tr.classList.contains('en-gracia')) return;
    tr.classList.add('en-gracia');
    const subject = tr.querySelector('.subject-line');
    if (subject && !subject.querySelector('.badge-transferido')) {
      subject.insertAdjacentHTML('beforeend', '<span class="badge-transferido">Transferido</span>');
    }
  }
  function _limpiarGracia() {
    sessionStorage.removeItem('cw_casos_en_gracia');
    tbody.querySelectorAll('tr.en-gracia').forEach(tr => {
      tr.classList.remove('en-gracia');
      tr.querySelector('.badge-transferido')?.remove();
    });
    _limpiarGraciaCierre();
  }

  // ── Margen de error al cerrar ──
  // Mismo mecanismo que arriba, pero para el cierre de casos (desde la lista o desde
  // dentro del caso): un caso que cerrás sigue viéndose en la bandeja actual —apagado,
  // con el estado "Cerrado"— hasta que cambiás de bandeja o tocás el filtro "Casos abiertos".
  function getCierreEnGracia() {
    try { return JSON.parse(sessionStorage.getItem('cw_cierre_en_gracia') || '{}'); } catch (e) { return {}; }
  }
  function _marcarCierreEnGracia(ticket) {
    const g = getCierreEnGracia();
    g[ticket] = true;
    sessionStorage.setItem('cw_cierre_en_gracia', JSON.stringify(g));
    const tr = tbody.querySelector(`tr[data-ticket="${ticket}"]`);
    if (tr) tr.classList.add('en-gracia');
  }
  function _limpiarGraciaCierre() {
    sessionStorage.removeItem('cw_cierre_en_gracia');
  }

  // ── Asignado map ──
  let _asignadoMap = {};
  try { _asignadoMap = JSON.parse(localStorage.getItem('cw_asignado_map') || '{}'); } catch {}
  function saveAsignadoMap() {

  }

  let _bandejaDisplayMap = {};
  try { _bandejaDisplayMap = JSON.parse(localStorage.getItem('cw_bandeja_display_map') || '{}'); } catch {}
  function saveBandejaDisplayMap() {
    try { localStorage.setItem('cw_bandeja_display_map', JSON.stringify(_bandejaDisplayMap)); } catch {}
  }

  function _saveTransferEventBandeja(ticket, destinoLabel) {
    const now   = new Date();
    const fecha = now.toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' }).replace('.','');
    const hora  = now.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    const event = { transferId:'tr_'+Date.now(), ticket, destino:destinoLabel, fecha, hora, ts:Date.now() };
    const key   = 'cw_transfers_' + ticket;
    const list  = JSON.parse(localStorage.getItem(key) || '[]');
    list.push(event);
    localStorage.setItem(key, JSON.stringify(list));
  }

  function buildAsignadoCell(ticket) {
    const userKey = _asignadoMap[ticket];
    const displayBandeja = bandejaLabels[_bandejaDisplayMap[ticket]] || 'Bandeja principal';
    const userInfo = getUserInfoMap();
    if (userKey && userInfo[userKey]) {
      const u = userInfo[userKey];
      return `<div class="user-cell">
        <div class="mini-avatar" style="background:${u.gradient}">${u.initials}</div>
        <div class="user-cell-info">
          <div class="name">${u.name}</div>
          <div class="bandeja">${displayBandeja}</div>
        </div>
      </div>`;
    }
    return '<span class="sin-asignar">Sin asignar</span>';
  }

  function applyAsignadoMap() {
    tbody.querySelectorAll('tr[data-ticket]').forEach(tr => {
      const cell = tr.querySelector('.td-asignado');
      if (!cell) return;
      cell.innerHTML = buildAsignadoCell(tr.dataset.ticket);
    });
  }

  function applyBandejaMap() {
    const map = getBandejaMap();
    tbody.querySelectorAll('tr[data-ticket]').forEach(tr => {
      const saved = map[tr.dataset.ticket];
      if (saved) tr.dataset.bandeja = saved;
    });
  }

  function revertCases() {
    const checked = getRowChecks().filter(c => c.checked);
    if (!checked.length) return;
    const map = getBandejaMap();
    let any = false;
    checked.forEach(c => {
      const tr = c.closest('tr');
      const ticket = tr.dataset.ticket;
      if (!ticket) return;
      const current = tr.dataset.bandeja;
      if (!_esUsuarioKey(current)) return;
      const realBandeja = _bandejaDisplayMap[ticket] || getBandejasDinamicas()[0]?.key;
      if (!realBandeja) return;
      any = true;
      delete _asignadoMap[ticket];
      map[ticket] = realBandeja;
      tr.dataset.bandeja = realBandeja;
      const cell = tr.querySelector('.td-asignado');
      if (cell) cell.innerHTML = buildAsignadoCell(ticket);
      _saveTransferEventBandeja(ticket, 'la bandeja');
    });
    if (!any) { closeTransferModal(); return; }
    saveBandejaMap(map);
    saveAsignadoMap();
    saveBandejaDisplayMap();
    closeTransferModal();
    applyVisibility();
    recountFilters();
    updateBandejaCounts();
    clearSelection();
    _persistAllCases();
    showToast(`${checked.length} caso${checked.length > 1 ? 's' : ''} devuelto${checked.length > 1 ? 's' : ''} a la bandeja`);
    _syncBandejaCambios(checked);
  }

  function _syncBandejaCambios(checked) { const porDestino = {}; checked.forEach(c => { const tr = c.closest('tr'); const ticket = tr && tr.dataset.ticket; if (!ticket) return; const destino = tr.dataset.bandeja; (porDestino[destino] = porDestino[destino] || []).push(ticket); }); Object.entries(porDestino).forEach(([destino, tks]) => { const resuelto = _bandejaIdPorKey[destino]; const patch = resuelto ? { bandeja_id: resuelto.id, sub_bandeja_id: resuelto.subId, asignado_user_id: null } : (_esUsuarioKey(destino) ? { asignado_user_id: destino === 'user_ng' ? CURRENT_USER_ID : destino } : null); if (!patch) return; supabaseClient.from('centralweb_casos').update(patch).eq('empresa_id', EMPRESA_ID).in('ticket', tks).then(({ error }) => { if (error) console.error('No se pudo sincronizar la bandeja en Supabase:', error); }); }); } function transferCases(targetBandeja) {
    const checked = getRowChecks().filter(c => c.checked);
    if (!checked.length) { showToast('Seleccioná al menos un caso'); return; }
    const map = getBandejaMap();
    const isUser = _esUsuarioKey(targetBandeja);
    checked.forEach(c => {
      const tr = c.closest('tr');
      const ticket = tr.dataset.ticket;
      if (!ticket) return;
      const currentBandeja = tr.dataset.bandeja; // valor ANTES del transfer
      _prevBandejaMap[ticket] = currentBandeja;
      map[ticket] = targetBandeja;
      tr.dataset.bandeja = targetBandeja;
      if (isUser) {
        _asignadoMap[ticket] = targetBandeja;
        // Guardar bandeja actual como display solo si no es un usuario
        if (!_esUsuarioKey(currentBandeja)) {
          _bandejaDisplayMap[ticket] = currentBandeja;
        }
      } else {
        delete _asignadoMap[ticket];
        _bandejaDisplayMap[ticket] = targetBandeja;
      }
      // Margen de error: si lo estabas viendo en esa bandeja, sigue apareciendo ahí (apagado)
      // hasta que cambies de bandeja o filtres "Abierto".
      if (!_esUsuarioKey(currentBandeja) && currentBandeja === activeBandeja) {
        _marcarEnGracia(ticket, currentBandeja);
      }
      const cell = tr.querySelector('.td-asignado');
      if (cell) cell.innerHTML = buildAsignadoCell(ticket);
      // Guardar evento de transferencia en timeline del caso
      const destinoLabel = isUser ? getUserInfoMap()[targetBandeja].name : bandejaLabels[targetBandeja];
      _saveTransferEventBandeja(ticket, destinoLabel);
    });
    saveBandejaMap(map);
    saveAsignadoMap();
    saveBandejaDisplayMap();
    savePrevBandejaMap();
    closeTransferModal();
    applyVisibility();
    recountFilters();
    updateBandejaCounts();
    clearSelection();
    _persistAllCases();
    showToast(`${checked.length} caso${checked.length > 1 ? 's' : ''} transferido${checked.length > 1 ? 's' : ''} a ${bandejaLabels[targetBandeja]}`); _syncBandejaCambios(checked);
  }

  function bulkEstado(newStatus) {
    const checked = getRowChecks().filter(c => c.checked);
    if (!checked.length) { showToast('Seleccioná al menos un caso'); return; }
    const map = getStatusMap();
    const tickets = [];
    checked.forEach(c => {
      const tr = c.closest('tr');
      tr.dataset.status = newStatus;
      tr.querySelector('td:nth-child(5)').innerHTML = badgeMap[newStatus];
      if (tr.dataset.ticket) { map[tr.dataset.ticket] = newStatus; tickets.push(tr.dataset.ticket); }
      if (newStatus === 'cerrado' && tr.dataset.ticket) _marcarCierreEnGracia(tr.dataset.ticket);
    });
    saveStatusMap(map);
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    applyVisibility();
    recountFilters();
    clearSelection();
    _persistAllCases();
    showToast(`${checked.length} caso${checked.length > 1 ? 's' : ''} marcado${checked.length > 1 ? 's' : ''} como ${newStatus}`);
    // Guarda el cambio de estado en Supabase (no bloquea la UI, que ya se actualizó arriba)
    if (tickets.length) {
      supabaseClient.from('centralweb_casos').update({ estado: newStatus }).eq('empresa_id', EMPRESA_ID).in('ticket', tickets)
        .then(({ error }) => { if (error) console.error('No se pudo actualizar el estado en Supabase:', error); });
    }
  }

  function applyStatusMap() {
    const map = getStatusMap();
    document.querySelectorAll('tbody tr[data-ticket]').forEach(tr => {
      const saved = map[tr.dataset.ticket];
      if (saved) {
        tr.dataset.status = saved;
        tr.querySelector('td:nth-child(5)').innerHTML = badgeMap[saved];
      }
    });
  }

  // ════════════════════════════════
  //  TAB MANAGEMENT
  // ════════════════════════════════
  function getTabs() { try { return JSON.parse(localStorage.getItem('cw_tabs') || '[]'); } catch { return []; } }
  function setTabs(t) { localStorage.setItem('cw_tabs', JSON.stringify(t)); }
  function getActiveTab() { return localStorage.getItem('cw_active_tab') || 'bandeja'; }
  function setActiveTab(v) { localStorage.setItem('cw_active_tab', v); }

  function renderTabs() {
    const tabs   = getTabs();
    const active = getActiveTab();
    const cont   = document.getElementById('case-tabs');
    cont.innerHTML = tabs.map(t => `
      <div class="case-tab${active === t.ticket ? ' active' : ''}" data-ticket="${t.ticket}" onclick="switchTab('${t.ticket}')">
        <span class="tab-label" title="${t.subject}">${t.ticket} — ${(t.fromName||'').split(' ')[0]}</span>
        <button class="tab-close" onclick="event.stopPropagation();closeTab('${t.ticket}')">×</button>
      </div>`).join('');
  }

  function switchTab(ticket) {
    const tab = getTabs().find(t => t.ticket === ticket);
    if (!tab) return;
    localStorage.setItem('cw_caso_actual', JSON.stringify(tab));
    setActiveTab(ticket);
    window.location.href = 'caso-detalle.html';
  }

  function closeTab(ticket) {
    let tabs = getTabs().filter(t => t.ticket !== ticket);
    setTabs(tabs);
    if (getActiveTab() === ticket) setActiveTab('bandeja');
    renderTabs();
  }

  // ════════════════════════════════
  //  READ STATE (persiste en localStorage)
  // ════════════════════════════════
  function getReadSet() {
    try { return new Set(JSON.parse(localStorage.getItem('cw_read') || '[]')); }
    catch { return new Set(); }
  }
  function markTicketRead(ticket) {
    const s = getReadSet();
    s.add(ticket);
    localStorage.setItem('cw_read', JSON.stringify([...s]));
  }
  function applyReadState() {
    // No-op: el estado leido ahora es global (Supabase, columna leido).
    updateUnreadBadge();
  }

  // ════════════════════════════════
  //  ROW CLICK → DETAIL
  // ════════════════════════════════
  tbody.addEventListener('click', async e => {
    const tr = e.target.closest('tr');
    if (!tr || e.target.tagName === 'INPUT' || tr.id === 'empty-state-row') return;
    if (!tieneAccesoCaso(tr.dataset.bandeja, tr.dataset.realBandeja)) { alert('No tenés permiso para abrir este caso: pertenece a una bandeja a la que no tenés acceso.'); return; }

    // Recolectar datos del caso desde el DOM
    const fromRaw  = tr.querySelector('.from-line')?.textContent.replace('De: ', '').trim() || '';
    const fromMatch = fromRaw.match(/^(.+?)\s*<(.+?)>$/);
    const caso = {
      ticket:    tr.dataset.ticket || '',
      status:    tr.dataset.status || 'abierto',
      bandeja:   tr.dataset.bandeja || getBandejasDinamicas()[0]?.key,
      subject:   (function(){ const sl = tr.querySelector('.subject-line'); if (!sl) return ''; const clone = sl.cloneNode(true); const badge = clone.querySelector('.badge-transferido'); if (badge) badge.remove(); return clone.textContent.trim(); })(),
      fromName:  fromMatch ? fromMatch[1].trim() : fromRaw,
      fromEmail: fromMatch ? fromMatch[2].trim() : '',
      userInit:  tr.querySelector('.mini-avatar')?.textContent.trim() || '',
      userName:  tr.querySelector('.name')?.textContent.trim() || '',
      userTeam:  tr.querySelector('.bandeja')?.textContent.trim() || '',
      date:      tr.querySelector('.date')?.textContent.trim() || '',
      time:      tr.querySelector('.time')?.textContent.trim() || '',
    };
    localStorage.setItem('cw_caso_actual', JSON.stringify(caso));
    localStorage.setItem('cw_ultimo_visto', caso.ticket);

    // Agregar a pestañas si no existe
    const tabs = getTabs();
    if (!tabs.find(t => t.ticket === caso.ticket)) {
      tabs.push(caso);
      setTabs(tabs);
    }
    setActiveTab(caso.ticket);

    // Marcar como leído (local + Supabase, global para todos los usuarios)
    if (caso.ticket) markTicketRead(caso.ticket);
    if (caso.ticket) { try { await supabaseClient.from('centralweb_casos').update({ leido: true }).eq('ticket', caso.ticket); } catch (eLeido) {} }
    tr.classList.remove('unread');
    tr.querySelector('.mail-icon')?.classList.replace('unread', 'read');
    updateUnreadBadge();
    window.location.href = 'caso-detalle.html';
  });

  function updateUnreadBadge() {
    const unread = [...tbody.querySelectorAll('tr.unread')].length;
    const badge  = document.querySelector('.nav-badge.red');
    if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? '' : 'none'; }
    updateBandejaCounts();
  }

  function updateBandejaCounts() {
    const rows = [...tbody.querySelectorAll('tr[data-ticket]')];
    const bandejaKeys = [...getBandejasAccesibles().map(b => b.key), ...getSubbandejasAccesibles().map(s => s.key)];
    const otrasKeys = ['asignados', ...getUsuariosDinamicos().map(u => u.key)];
    const allKeys = [...bandejaKeys, ...otrasKeys];
    const counts = {};
    allKeys.forEach(k => counts[k] = 0);
    rows.forEach(tr => {
      if (!tr.classList.contains('unread')) return;
      const b = tr.dataset.bandeja;
      if (counts.hasOwnProperty(b)) counts[b]++;
    });
    [...bandejaKeys, ...otrasKeys].forEach(k => {
      const el = document.getElementById(`bc-${k}`);
      if (!el) return;
      el.textContent = counts[k] || '';
      el.style.display = counts[k] > 0 ? '' : 'none';
    });
  }

  // ════════════════════════════════
  //  SORT
  // ════════════════════════════════
  const MONTHS = {ene:1,feb:2,mar:3,abr:4,may:5,jun:6,jul:7,ago:8,sep:9,oct:10,nov:11,dic:12};

  function dateToTs(dateStr, timeStr) {
    const [d, m, y] = dateStr.trim().split(' ');
    const [hh, mm] = timeStr.replace(' hs','').split(':');
    return parseInt(`${y}${String(MONTHS[m]).padStart(2,'0')}${d.padStart(2,'0')}${hh}${mm}`);
  }

  let sortDir = 'asc'; // asc = antiguos primero

  function sortRows() {
    const rows = [...tbody.querySelectorAll('tr[data-ts]')];
    rows.sort((a, b) => sortDir === 'asc'
      ? a.dataset.ts - b.dataset.ts
      : b.dataset.ts - a.dataset.ts
    );
    rows.forEach(tr => tbody.appendChild(tr));
  }

  document.getElementById('sort-btn').addEventListener('click', () => {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    const btn = document.getElementById('sort-btn');
    btn.title = sortDir === 'asc' ? 'Más antiguos primero' : 'Más recientes primero';
    document.getElementById('sort-icon').innerHTML = sortDir === 'asc'
      ? '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 9 1 6 5 6"/>'
      : '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 15 1 18 5 18"/>';
    sortRows();
  });

  // ════════════════════════════════
  //  BANDEJA DROPDOWN
  // ════════════════════════════════
  function getBandejasDinamicas() {
    if (BANDEJAS_DINAMICAS.length) return BANDEJAS_DINAMICAS;
    return [{ key: 'sin-bandeja', nombre: 'Sin bandejas configuradas', subbandejas: [] }];
  }

  // Sub-bandejas aplanadas de todas las bandejas padre, con key compuesta para no colisionar entre padres distintos
  function getSubbandejasDinamicas() {
    const out = [];
    getBandejasDinamicas().forEach(b => {
      (b.subbandejas || []).forEach(s => {
        out.push({ key: `${b.key}::${s.key}`, nombre: s.nombre });
      });
    });
    return out;
  }

  // Usuario real logueado (antes era simulado con "Ver como [usuario]" en localStorage)
  const CURRENT_USER_KEY = perfil.id;
  const GRADIENTES = GRADIENTES_DB;

  // Usuarios reales de la empresa (tabla profiles)
  function getUsuariosDinamicos() {
    const onlineGuardado = localStorage.getItem('cw_disponible') !== 'off';
    const PRESENCIA_MS = 2 * 60 * 1000; // conectado = tuvo actividad en los ultimos 2 minutos
    const ahora = Date.now();
    return USUARIOS_DINAMICOS.map(u => {
      if (u.key === CURRENT_USER_KEY) return { ...u, online: onlineGuardado };
      const visto = u.last_seen ? new Date(u.last_seen).getTime() : 0;
      return { ...u, online: (ahora - visto) < PRESENCIA_MS };
    });
  }

  // ── Presencia real: marca al usuario logueado como "activo" en Supabase
  // (reemplaza el online:true fijo que mostraba a todos como conectados)
  async function _actualizarPresencia() {
    try {
      await supabaseClient.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', CURRENT_USER_ID);
    } catch (e) { /* silencioso */ }
  }
  _actualizarPresencia();
  setInterval(_actualizarPresencia, 60000);

  function _esUsuarioKey(k) { return !!k && (k === 'user_ng' || getUsuariosDinamicos().some(u => u.key === k)); } // ── Permisos por bandeja (tabla centralweb_permisos) ──
  function getPermisos() {
    return PERMISOS_DINAMICOS;
  }

  const ES_ADMIN = (getUsuariosDinamicos().find(u => u.key === CURRENT_USER_KEY)?.rol) === 'Administrador';
  // El acceso a admin.html es solo para administradores — simulado con "Ver como [usuario]".
  document.getElementById('config-menu-admin-item').style.display = ES_ADMIN ? '' : 'none';

  // Las sub-bandejas heredan el permiso de su bandeja padre (no se configuran aparte, ver admin.html).
  function tieneAccesoBandeja(key) {
    if (ES_ADMIN) return true;
    const parentKey = key.includes('::') ? key.split('::')[0] : key;
    return !!getPermisos()[parentKey]?.[CURRENT_USER_KEY]?.acceso;
  }

  // Excepcion: si el caso esta asignado a mi, lo puedo trabajar aunque no tenga acceso a su bandeja real
  // (asignar puntualmente es en si mismo un permiso de excepcion; el perfil de respuesta sigue siendo el de la bandeja original).
  function tieneAccesoCaso(subBandeja, realBandeja) {
    if (ES_ADMIN) return true;
    if (subBandeja === CURRENT_USER_KEY) return true;
    return tieneAccesoBandeja(realBandeja || subBandeja);
  }

  function getBandejasAccesibles() {
    return getBandejasDinamicas().filter(b => tieneAccesoBandeja(b.key));
  }

  function getSubbandejasAccesibles() {
    return getSubbandejasDinamicas().filter(s => tieneAccesoBandeja(s.key));
  }

  function getUserInfoMap() {
    const map = {};
    getUsuariosDinamicos().forEach(u => { map[u.key] = u; });
    return map;
  }

  function renderNuevoCasoAsignadoSelect() {
    const select = document.getElementById('nuevo-caso-asignado');
    if (!select) return;
    select.innerHTML = '<option value="">Sin asignar</option>' +
      getUsuariosDinamicos().map(u => `<option value="${u.key}">${u.name}</option>`).join('');
  }
  renderNuevoCasoAsignadoSelect();

  function renderNuevoCasoBandejaSelect() {
    const select = document.getElementById('nuevo-caso-bandeja');
    if (!select) return;
    select.innerHTML = getBandejasAccesibles().map(b => `<option value="${b.key}">${b.nombre}</option>`).join('') +
      getSubbandejasAccesibles().map(s => `<option value="${s.key}">${s.nombre}</option>`).join('');
  }
  renderNuevoCasoBandejaSelect();

  const bandejaLabels = {
    asignados:   'Mis asignados',
  };
  getBandejasDinamicas().forEach(b => { bandejaLabels[b.key] = b.nombre; });
  getSubbandejasDinamicas().forEach(s => { bandejaLabels[s.key] = s.nombre; });
  getUsuariosDinamicos().forEach(u => { bandejaLabels[u.key] = u.name; });

  function renderBandejasDinamicas() {
    const list = document.getElementById('bandeja-dinamicas-list');
    if (!list) return;
    const iconBandeja = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>';
    list.innerHTML = getBandejasAccesibles().map(b => `
      <div class="bandeja-item" data-bandeja="${b.key}">
        ${iconBandeja}
        ${b.nombre}
        <span class="bandeja-count" id="bc-${b.key}"></span>
      </div>`).join('');
    list.querySelectorAll('.bandeja-item[data-bandeja]').forEach(item => {
      item.addEventListener('click', () => {
        setBandeja(item.dataset.bandeja, true);
        document.getElementById('bandeja-menu').classList.remove('open');
      });
    });
  }
  renderBandejasDinamicas();

  function renderSubbandejasDinamicas() {
    const list = document.getElementById('bandeja-subbandejas-list');
    if (!list) return;
    const iconSub = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.7"><path d="M9 18l6-6-6-6"/></svg>';
    list.innerHTML = getSubbandejasAccesibles().map(s => `
      <div class="bandeja-item" data-bandeja="${s.key}">
        ${iconSub}
        ${s.nombre}
        <span class="bandeja-count" id="bc-${s.key}"></span>
      </div>`).join('');
    list.querySelectorAll('.bandeja-item[data-bandeja]').forEach(item => {
      item.addEventListener('click', () => {
        setBandeja(item.dataset.bandeja, true);
        document.getElementById('bandeja-menu').classList.remove('open');
      });
    });
  }
  renderSubbandejasDinamicas();

  function setBandeja(key, resetFilter = false) {
    if (key !== activeBandeja) _limpiarGracia();
    activeBandeja = key;
    localStorage.setItem('cw_bandeja', key);
    document.getElementById('bandeja-label').textContent = bandejaLabels[key];
    document.querySelectorAll('.bandeja-item').forEach(i =>
      i.classList.toggle('active', i.dataset.bandeja === key)
    );
    document.querySelectorAll('.nav-subitem').forEach(i =>
      i.classList.toggle('active', i.dataset.bandeja === key)
    );
    if (resetFilter) {
      activeFilter = 'abierto';
      localStorage.setItem('cw_filtro', 'abierto');
      document.querySelectorAll('.status-filter').forEach(b => b.classList.remove('active'));
      document.querySelector('.status-filter[data-status="abierto"]')?.classList.add('active');
      // Cambiar de bandeja o usuario limpia la búsqueda y el filtro "incluir cerrados" activos
      searchQuery = '';
      searchInput.value = '';
      localStorage.removeItem('cw_search_query');
      showCerrados = false;
      incluirCerrados.checked = false;
      localStorage.removeItem('cw_incluir_cerrados');
      document.getElementById('bandeja-label').textContent = bandejaLabels[key];
    }
    clearSelection(true);
    applyBandejaMap();
    applyStatusMap();
    applyVisibility();
    recountFilters();
  }

    e.stopPropagation();
    const btn  = document.getElementById('usuarios-toggle-btn');

    const list = document.getElementById('bandeja-usuarios-list');

    const counts = {};
    const usuarios = getUsuariosDinamicos();

    list.innerHTML = sorted.map(u => {

          <span style="position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;border-radius:50%;background:${u.online ? '#22c55e' : '#94a3b8'};border:1.5px solid white"></span>

  function updateTransferUserCounts() {
    const counts = {};
    const usuarios = getUsuariosDinamicos();
    usuarios.forEach(u => counts[u.key] = 0);
    tbody.querySelectorAll('tr[data-ticket]').forEach(tr => {
      const b = tr.dataset.bandeja;
      const s = tr.dataset.status;
      if (counts.hasOwnProperty(b) && s === 'abierto') counts[b]++;
    });
    const sorted = [...usuarios].sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));
    const list = document.getElementById('transfer-users-list');

    list.innerHTML = sorted.map(u => {
      const cnt = counts[u.key] || 0;
      const nameColor = u.online ? '#1e293b' : '#94a3b8';

        <span class="tm-online-dot" style="background:${u.online ? '#22c55e' : '#94a3b8'}"></span>
        <span style="color:${nameColor};flex:1">${u.name}</span>
        ${cnt > 0 ? `<span class="tm-user-count">${cnt}</span>` : ''}
