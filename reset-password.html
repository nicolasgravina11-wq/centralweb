<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restablecer contraseña — CentralWeb</title>
<style>
  :root {
    --blue-900:  #0d2244;
    --blue-800:  #0e3a6e;
    --blue-700:  #1352a8;
    --blue-600:  #1a6cd4;
    --blue-500:  #2183f0;
    --blue-400:  #4fa3f7;
    --blue-300:  #7cc2fb;
    --blue-200:  #bfdffd;
    --blue-100:  #e8f3fe;
    --blue-50:   #f4f9ff;

    --text-primary:   #0d1f3c;
    --text-secondary: #4a6285;
    --text-muted:     #8ba4c4;
    --border:         #d0e2f7;
    --bg:             #f0f5fc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { width: 420px; max-width: 92vw; padding: 24px 0; }
  .header { text-align: center; margin-bottom: 24px; }
  .brand { font-size: 22px; font-weight: 800; color: var(--blue-800); }
  .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
  input[type=password], input[type=text] {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13.5px;
    color: var(--text-primary);
    background: var(--blue-50);
  }
  input[type=password]:focus, input[type=text]:focus { outline: 2px solid var(--blue-300); background: white; }
  .error-msg {
    font-size: 12px;
    color: #b91c1c;
    margin-top: 10px;
    display: none;
  }
  .error-msg.show { display: block; }
  button.btn-primary {
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: var(--blue-600);
    color: white;
  }
  button.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .alt-link { text-align: center; font-size: 12.5px; color: var(--text-muted); margin-top: 14px; }
  .alt-link a { color: var(--blue-600); text-decoration: none; }
  .pwd-wrap { position: relative; }
  .pwd-wrap input[type=password], .pwd-wrap input[type=text] { padding-right: 38px; }
  .pwd-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
    color: var(--text-muted); display: flex; align-items: center;
  }
  .pwd-toggle:hover { color: var(--text-secondary); }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="brand">CentralWeb</div>
    <div class="sub">Elegí tu nueva contraseña</div>
  </div>

  <div class="card">
    <div class="field">
      <label class="field-label">Nueva contraseña</label>
      <div class="pwd-wrap">
        <input type="password" id="input-pass1" placeholder="Mínimo 6 caracteres">
        <button type="button" class="pwd-toggle" onclick="_togglePwd('input-pass1', this)" aria-label="Mostrar contraseña"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Repetir contraseña</label>
      <div class="pwd-wrap">
        <input type="password" id="input-pass2" placeholder="Repetí la contraseña">
        <button type="button" class="pwd-toggle" onclick="_togglePwd('input-pass2', this)" aria-label="Mostrar contraseña"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <button class="btn-primary" id="btn-guardar" onclick="guardarNuevaPassword()">Guardar contraseña</button>
  <p class="alt-link"><a href="login.html">Volver al inicio de sesión</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  function _togglePwd(id, btn) {
    const input = document.getElementById(id);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
  }

  let sesionRecuperacionLista = false;

  function mostrarError(msg, color) {
    const el = document.getElementById('error-msg');
    el.style.color = color || '';
    el.textContent = msg;
    el.classList.add('show');
  }

  async function guardarNuevaPassword() {
    if (!sesionRecuperacionLista) {
      mostrarError('El link de recuperación no es válido o ya expiró. Pedí uno nuevo desde el login.');
      return;
    }
    const p1 = document.getElementById('input-pass1').value;
    const p2 = document.getElementById('input-pass2').value;
    if (!p1 || !p2) {
      mostrarError('Completá ambos campos.');
      return;
    }
    if (p1.length < 6) {
      mostrarError('La contraseña debe tener al menos 6 caracteres.');
      return;
    }
    if (p1 !== p2) {
      mostrarError('Las contraseñas no coinciden.');
      return;
    }
    const boton = document.getElementById('btn-guardar');
    boton.disabled = true;
    boton.textContent = 'Guardando...';
    const { error } = await supabaseClient.auth.updateUser({ password: p1 });
    if (error) {
      boton.disabled = false;
      boton.textContent = 'Guardar contraseña';
      mostrarError(error.message);
      return;
    }
    await supabaseClient.auth.signOut();
    boton.textContent = 'Listo, redirigiendo...';
    mostrarError('Contraseña actualizada. Ya podés iniciar sesión con tu nueva clave.', '#059669');
    setTimeout(() => { window.location.href = 'login.html'; }, 2200);
  }

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') sesionRecuperacionLista = true;
  });

  // Fallback: si el token ya se proceso antes de registrar el listener de arriba
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) sesionRecuperacionLista = true;
  });
</script>

</body>
</html>
